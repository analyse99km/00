name: Zeno Data Organism

on:
  repository_dispatch:
    types: [rebirth-trigger]
  workflow_dispatch:
    inputs:
      run_mode:
        description: Boot validation or full organism cycle
        required: true
        default: full
        type: choice
        options:
          - boot
          - full
      run_hours:
        description: Hours to run for full mode
        required: false
        default: "3.2"
        type: string
  push:
    branches: [main]

concurrency:
  group: zeno-${{ github.repository }}
  cancel-in-progress: true

env:
  RUN_HOURS: "3.2"
  ZENO_MAX_RUNTIME_HOURS: "3.2"
  ZENO_SHUTDOWN_MARGIN_SECONDS: "3000"
  ZENO_X_POST_ATTEMPTS: "1"
  ZENO_X_SEARCH_MODE: "top"
  ZENO_IMPORT_LEGACY_LOGINS: "0"
  ZENO_REPO_TEMPLATE: "v{iteration}"
  ZENO_REPO_PRIVATE: "0"
  ZENO_DELETE_PREVIOUS_REPO_ON_BOOT: "1"
  ZENO_TRIGGER_AFTER_PUSH: "1"
  ZENO_SNAPSHOT_RETENTION: "8"
  ZENO_PRIMARY_MODEL: "tinyllama"
  ZENO_OLLAMA_MODELS: "tinyllama"
  ZENO_MODEL_CODING: "tinyllama"
  ZENO_MODEL_PLANNING: "tinyllama"
  ZENO_MODEL_CHAT: "tinyllama"
  ZENO_MODEL_SUMMARY: "tinyllama"
  ZENO_MODEL_DEBUG: "tinyllama"
  ZENO_MODEL_QUICK: "tinyllama"
  ZENO_CHROMIUM_PROFILE_REPO: "https://github.com/analyse99km/cpr.git"
  ZENO_CHROMIUM_PROFILE_REF: ""
  PYTHONUNBUFFERED: "1"

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 355

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Hydrate Zeno Chromium profile
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          rm -rf chromium .nexus-chromium-profile
          mkdir -p chromium/Default
          clone_ok=0
          AUTH_REPO=$(echo "${{ env.ZENO_CHROMIUM_PROFILE_REPO }}" | sed "s|https://|https://x-access-token:${GH_PAT}@|")
          if [ -n "${{ env.ZENO_CHROMIUM_PROFILE_REF }}" ]; then
            if git clone --depth=1 --branch "${{ env.ZENO_CHROMIUM_PROFILE_REF }}" "$AUTH_REPO" .nexus-chromium-profile; then
              clone_ok=1
            else
              echo "Profile branch '${{ env.ZENO_CHROMIUM_PROFILE_REF }}' is unavailable; retrying default branch."
              rm -rf .nexus-chromium-profile
              git clone --depth=1 "$AUTH_REPO" .nexus-chromium-profile && clone_ok=1 || true
            fi
          else
            git clone --depth=1 "$AUTH_REPO" .nexus-chromium-profile && clone_ok=1 || true
          fi
          if [ "${clone_ok}" = "1" ] && [ -d ".nexus-chromium-profile/.git" ]; then
            source_dir=".nexus-chromium-profile"
            if [ -d ".nexus-chromium-profile/chromium" ]; then
              source_dir=".nexus-chromium-profile/chromium"
            fi
            shopt -s dotglob nullglob
            copied=0
            for item in "${source_dir}"/*; do
              if [ "$(basename "${item}")" = ".git" ]; then
                continue
              fi
              cp -a "${item}" chromium/
              copied=1
            done
            shopt -u dotglob nullglob
            if [ "${copied}" = "0" ]; then
              echo "Chromium profile repo is empty; continuing with a fresh chromium/Default directory."
            fi
          else
            echo "Chromium profile repo is unavailable; continuing with a fresh chromium/Default directory."
          fi
          find chromium \( -name 'Singleton*' -o -name 'DevToolsActivePort' \) -print -delete || true
          rm -rf .nexus-chromium-profile
          find chromium -maxdepth 2 -mindepth 1 | sort | sed -n '1,40p'

      - name: Build Zeno container
        run: docker build -t zeno:latest .

      - name: Run Zeno inside Docker
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_PAT_FG: ${{ secrets.GH_PAT_FG }}
          OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          HOURS="$RUN_HOURS"
          BOOT_ONLY="0"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.run_mode }}" = "boot" ]; then
              BOOT_ONLY="1"
            fi
            if [ -n "${{ github.event.inputs.run_hours }}" ]; then
              HOURS="${{ github.event.inputs.run_hours }}"
            fi
          fi

          docker run --rm --shm-size=2g \
            -e GH_PAT \
            -e GH_PAT_FG \
            -e OLLAMA_HOST \
            -e GITHUB_REPOSITORY \
            -e GITHUB_ACTIONS=true \
            -e CI=true \
            -e CHROMIUM_PATH=/usr/bin/ungoogled-chromium \
            -e ZENO_BOOT_SEQUENCE_ONLY="$BOOT_ONLY" \
            -e ZENO_RUN_HOURS_OVERRIDE="$HOURS" \
            -e ZENO_MAX_RUNTIME_HOURS="${{ env.ZENO_MAX_RUNTIME_HOURS }}" \
            -e ZENO_SHUTDOWN_MARGIN_SECONDS="${{ env.ZENO_SHUTDOWN_MARGIN_SECONDS }}" \
            -e ZENO_X_POST_ATTEMPTS="${{ env.ZENO_X_POST_ATTEMPTS }}" \
            -e ZENO_X_SEARCH_MODE="${{ env.ZENO_X_SEARCH_MODE }}" \
            -e ZENO_IMPORT_LEGACY_LOGINS="${{ env.ZENO_IMPORT_LEGACY_LOGINS }}" \
            -e ZENO_REPO_TEMPLATE="${{ env.ZENO_REPO_TEMPLATE }}" \
            -e ZENO_REPO_PRIVATE="${{ env.ZENO_REPO_PRIVATE }}" \
            -e ZENO_DELETE_PREVIOUS_REPO_ON_BOOT="${{ env.ZENO_DELETE_PREVIOUS_REPO_ON_BOOT }}" \
            -e ZENO_TRIGGER_AFTER_PUSH="${{ env.ZENO_TRIGGER_AFTER_PUSH }}" \
            -e ZENO_SNAPSHOT_RETENTION="${{ env.ZENO_SNAPSHOT_RETENTION }}" \
            -e ZENO_PRIMARY_MODEL="${{ env.ZENO_PRIMARY_MODEL }}" \
            -e ZENO_OLLAMA_MODELS="${{ env.ZENO_OLLAMA_MODELS }}" \
            -e ZENO_MODEL_CODING="${{ env.ZENO_MODEL_CODING }}" \
            -e ZENO_MODEL_PLANNING="${{ env.ZENO_MODEL_PLANNING }}" \
            -e ZENO_MODEL_CHAT="${{ env.ZENO_MODEL_CHAT }}" \
            -e ZENO_MODEL_SUMMARY="${{ env.ZENO_MODEL_SUMMARY }}" \
            -e ZENO_MODEL_DEBUG="${{ env.ZENO_MODEL_DEBUG }}" \
            -e ZENO_MODEL_QUICK="${{ env.ZENO_MODEL_QUICK }}" \
            -e PYTHONUNBUFFERED=1 \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            zeno:latest \
            bash -lc 'mkdir -p data/snapshots chromium && [ -f iteration.txt ] || echo "1" > iteration.txt && [ -f task.txt ] || : > task.txt && [ -f prev_repo.txt ] || : > prev_repo.txt && cp iteration.txt data/iteration.txt || true && if [ "$ZENO_BOOT_SEQUENCE_ONLY" = "1" ]; then python3 zeno_v1.py --run-hours "$ZENO_RUN_HOURS_OVERRIDE" --boot-validation-only; else python3 zeno_v1.py --run-hours "$ZENO_RUN_HOURS_OVERRIDE"; fi'
